    <style>
      .pic{

      .me2{
        width:100%;
        height:100%;
        object-fit: cover;
        border-radius: 50%;
        border: 2px solid black;
      }
      .contactPage .container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto auto;
        max-width: 60%;
        margin: 1.25rem auto;
        padding-bottom: 9.375rem;
        gap: 1.25rem;
      }

      .contactPage .contactinfo {
        grid-column: 1 / 2;
        grid-row: 1 / 2;
      }

      .contactPage .emailinfo {
        grid-column: 1 / 2;
        grid-row: 2 / 3;
      }

      .contactPage .phoneinfo {
        grid-column: 1 / 2;
        grid-row: 3 / 4;
      }

      .contactPage .pic { 
        grid-column: 2 / 3;
        grid-row: 1 / 4;
        min-height: 18rem;
        
        border-radius: 0.5rem;
      }

     
      .contactPage input {
        max-width: 50%;
        border: solid grey 0.5px;
        border-radius: 2%;
        height: 41px;
        background-color: rgba(243, 243, 243, 1);
      }

      .contactPage #message {

      }

      .contactPage .submitbutton {

        background-color: #eea302;
        height: 3.1875rem;
      }

      .contactPage .submitbutton:hover {
        background-color: rgba(243, 243, 243, 1);
      }

      @media (max-width: 1100px) {
        .contactPage .container {
          max-width: 90%;
          grid-template-columns: 1fr;
        }
